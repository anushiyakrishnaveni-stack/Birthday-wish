<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #fce4ec;
            color: #880e4f;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            margin: 20px 0;
            border: 5px solid #f06292;
        }
        .age-display {
            font-size: 1.2rem;
            font-weight: bold;
            background: #f8bbd0;
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            background-color: #ec407a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #d81b60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Happy Birthday! 🎂</h1>
    
    <img src="https://via.placeholder.com/400x300?text=Insert+Photo+Here" alt="Birthday Person">

    <p>Wishing you a day filled with happiness and a year filled with joy.</p>

    <div class="age-display" id="ageResult">
        Calculating your excellence...
    </div>

    <p>Press play for some birthday vibes:</p>
    <audio controls>
        <source src="your-music-file.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</div>

<script>
    // SET THE BIRTHDATE HERE (YYYY, MM-1, DD)
    // Note: Month is 0-indexed (0=Jan, 1=Feb, etc.)
    const birthDate = new Date(1999, 08, 11); 

    function calculateAge(dob) {
        const diffMs = Date.now() - dob.getTime();
        const ageDate = new Date(diffMs); 
        const years = Math.abs(ageDate.getUTCFullYear() - 1970);
        const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        
        return `You are officially **${years} years old** today!<br>That's ${days.toLocaleString()} days of being awesome.`;
    }

    document.getElementById('ageResult').innerHTML = calculateAge(birthDate);
</script>

</body>
</html>
